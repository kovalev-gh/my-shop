version: '3.9'

services:
  postgres_db:
    image: postgres:16
    container_name: myshop_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
    container_name: myshop_backend
    restart: always
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    depends_on:
      postgres_db:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PYTHONPATH=/app/app
    command: >
      uv run uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000} --reload

volumes:
  postgres_data: